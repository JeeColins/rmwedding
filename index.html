<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raffy and Mary May Wedding Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hurricane&display=swap" rel="stylesheet">

    <style>
        :root {
        /* 
            Fluid scaling: 
            - At 320px width, font-size is ~14px
            - At 1920px width, font-size is ~18px
            This scales all rem-based units (padding, margin, font-size) proportionally.
        */
        font-size: clamp(14px, 0.25vw + 13.2px, 18px);
        }

        @media (min-width: 2560px) {
        :root {
            font-size: 20px; /* Scale up for ultra-wide */
        }
        }

        body {
            font-family: 'Lato', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif, Georgia, 'Times New Roman', Times, serif;
        }

        #randm {
            font-family: 'Hurricane', cursive;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes flipNumber {
            0% { transform: rotateX(-90deg); opacity: 0; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        @keyframes cardFlip {
            0% { transform: rotateY(90deg); opacity: 0; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        @keyframes drawCheck {
            from { stroke-dashoffset: 24; }
            to { stroke-dashoffset: 0; }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        .animate-flip-number {
            animation: flipNumber 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            display: inline-block;
            perspective: 1000px;
        }

        .animate-card-flip {
            animation: cardFlip 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            perspective: 1000px;
        }

        .animate-draw-check {
            stroke-dasharray: 24;
            stroke-dashoffset: 24;
            animation: drawCheck 0.5s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }

        .scale-up {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .scale-up:hover {
            transform: scale(1.02);
        }

        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-[#faf9f6] text-[#333]">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
